name = "sunity-api"
main = "src/worker.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "enable_nodejs_http_server_modules"]

# Non-secret vars (secrets go via: wrangler secret put <KEY>)
[vars]
BETTER_AUTH_URL = "https://sunity-api.sayyidrafeed.workers.dev"
FRONTEND_URL = "https://sunity-web.vercel.app"
NODE_ENV = "production"
PORT = "3000"

# Uncomment after running: wrangler hyperdrive create sunity-db --connection-string="<YOUR_DB_URL>"
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "YOUR_HYPERDRIVE_ID"
