services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sunity
      POSTGRES_PASSWORD: sunity
      POSTGRES_DB: sunity
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunity"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
